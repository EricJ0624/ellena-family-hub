<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b4e28"/>
      <stop offset="45%" stop-color="#3d2a14"/>
      <stop offset="100%" stop-color="#5a4020"/>
    </linearGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3d26"/>
      <stop offset="100%" stop-color="#162e1c"/>
    </linearGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M0 11h22M11 0v22" stroke="#fff" stroke-opacity="0.055" stroke-width="0.5"/>
      <path d="M11 9.8v2.4M9.8 11h2.4" stroke="#fff" stroke-opacity="0.09" stroke-width="0.55" stroke-linecap="round"/>
    </pattern>
    <filter id="dust">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="n" mode="soft-light"/>
    </filter>
  </defs>
  <!-- frame -->
  <rect width="1000" height="640" fill="url(#wood)"/>
  <rect x="28" y="24" width="944" height="592" rx="3" fill="url(#board)" filter="url(#dust)"/>
  <rect x="28" y="24" width="944" height="592" fill="url(#grid)"/>
  <!-- chalk smudges -->
  <ellipse cx="200" cy="140" rx="180" ry="120" fill="#fff" opacity="0.06"/>
  <ellipse cx="780" cy="200" rx="160" ry="100" fill="#fff" opacity="0.05"/>
  <ellipse cx="620" cy="480" rx="220" ry="140" fill="#fff" opacity="0.05"/>
  <!-- decorative icons (baked in) -->
  <g fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <g transform="translate(820 52)">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </g>
    <g transform="translate(868 52)">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    </g>
    <g transform="translate(916 52)">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </g>
  </g>
  <!-- + ADD box placeholder (outline only) -->
  <rect x="792" y="108" width="168" height="52" rx="14" fill="none" stroke="#fff" stroke-opacity="0.75" stroke-width="2"/>
  <!-- chalk on ledge -->
  <rect x="900" y="598" width="52" height="10" rx="3" fill="#f2ede4" opacity="0.95"/>
  <rect x="948" y="599" width="14" height="8" rx="2" fill="#c9b896"/>
</svg>
